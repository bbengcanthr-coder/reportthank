<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> กี้ให้อุนนะ</title></title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffeaf2; /* ชมพูอ่อนแบบเมโลดี้ */
            font-family: 'Itim', cursive;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.5);
            border: 5px solid #ffb6c1;
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        .melody-img {
            width: 150px;
            margin-bottom: 20px;
        }

        h1 {
            color: #ff69b4;
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
        }

        button {
            padding: 10px 25px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-family: 'Itim', cursive;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #ff69b4;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3);
        }

        #noBtn {
            background-color: #ffd1dc;
            color: #ff69b4;
            position: absolute; /* จำเป็นสำหรับการขยับหนี */
        }

        /* หน้าจอเมื่อตอบตกลง */
        #success-message {
            display: none;
        }

        .heart {
            color: #ff69b4;
            font-size: 50px;
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <img src="https://i.pinimg.com/originals/f3/78/84/f3788469956d953609805908f90c1f21.gif" alt="My Melody" class="melody-img">
        
        <h1>อุนเป็นแฟนกับกี้นะ</h1>
        
        <div class="btn-group">
            <button id="yesBtn" onclick="celebrate()">เป็น</button>
            <button id="noBtn" onmouseover="moveButton()">ไม่เป็น</button>
        </div>
    </div>

    <div class="container" id="success-message">
        <img src="https://media.tenor.com/9v6rO_m4S7UAAAAM/my-melody-sanrio.gif" alt="Happy Melody" class="melody-img">
        <h1>เย้! รักอุนที่สุดเลย 💖</h1>
        <p>บันทึกไว้แล้วนะว่าเป็นแฟนกัน!</p>
        <div class="heart">🌸🎀🌸</div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            
            // สุ่มตำแหน่งใหม่ภายในหน้าจอ
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function celebrate() {
            document.getElementById('main-card').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
            
            // เพิ่มลูกเล่น confetti หรืออื่นๆ ได้ที่นี่
            startHeartRain();
        }

        // ฟังก์ชันเสริม: ทำหัวใจร่วง (Optional)
        function startHeartRain() {
            for(let i=0; i<30; i++) {
                let heart = document.createElement('div');
                heart.innerHTML = '💗';
                heart.style.position = 'fixed';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '-50px';
                heart.style.fontSize = Math.random() * 20 + 20 + 'px';
                heart.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
                document.body.appendChild(heart);
            }
        }
    </script>

    <style>
        @keyframes fall {
            to {
                transform: translateY(110vh);
            }
        }
    </style>
</body>
</html>
