<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>งานของกิ้</title>
    <style>
        /* --- 1. การตั้งค่าฟอนต์ --- */
        @font-face {
            font-family: 'DiffX';
            src: url('Diff_X.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* --- 2. สไตล์พื้นฐาน --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffeaf2; /* ชมพูอ่อนสุดน่ารัก */
            font-family: 'DiffX', 'Arial', sans-serif; /* ใช้ Diff_X ถ้าไม่มีใช้ Arial */
            overflow: hidden; /* ป้องกันสกอลบาร์โผล่ตอนปุ่มหนี */
            padding: 20px;
        }

        /* --- 3. สไตล์การ์ดหลัก (Responsive) --- */
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 350px; /* ขนาดพอดีมือถือ */
            border: 5px solid #ffb6c1; /* ขอบชมพู */
            position: relative;
            z-index: 10;
        }

        /* --- 4. สไตล์รูปภาพ GIF --- */
        .gif-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gif-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* --- 5. สไตล์ข้อความ --- */
        h1 {
            color: #ff69b4;
            font-size: 1.8rem; /* ปรับขนาดให้พอดีมือถือ */
            margin-bottom: 25px;
            line-height: 1.3;
        }

        /* --- 6. สไตล์โซนปุ่ม (จัดระเบียบ) --- */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px; /* ระยะห่างระหว่างปุ่ม */
            width: 100%;
            position: relative;
            margin-top: 10px;
            min-height: 60px; /* กันพื้นที่ไว้ให้ปุ่มไม่เป็นขยับ */
        }

        button {
            padding: 12px 24px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-family: 'DiffX', 'Arial', sans-serif;
            transition: all 0.2s ease-in-out;
            width: 100px; /* กำหนดความกว้างปุ่มให้เท่ากัน */
        }

        /* ปุ่ม "เป็น" */
        #yesBtn {
            background-color: #ff69b4;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background-color: #ff1493;
        }

        /* ปุ่ม "ไม่เป็น" */
        #noBtn {
            background-color: #fce4ec;
            color: #ff69b4;
            border: 2px solid #ffb6c1;
            position: relative; /* เริ่มต้นที่ตำแหน่งปกติ */
        }

        /* หน้าจอเมื่อตอบตกลง */
        #success-screen {
            display: none;
        }

        /* --- 7. เอฟเฟกต์หัวใจร่วง --- */
        .heart {
            position: fixed;
            top: -10vh;
            font-size: 2rem;
            color: #ff69b4;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="card" id="question-card">
        <div class="gif-container">
            <img src="KApYzjMVnBB9mH3fRn.gif" alt="Badtz Maru Pout">
        </div>
        
        <h1>อุนเป็นแฟนกับกิ้ป่าว</h1>
        
        <div class="btn-group">
            <button id="yesBtn" onclick="ansYes()">เป็น</button>
            <button id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()">ไม่เป็น</button>
        </div>
    </div>

    <div class="card" id="success-screen">
        <div class="gif-container">
            <img src="W1Mdg6KDFevJcjefJS.gif" alt="Badtz Maru Happy">
        </div>
        <h1>เย้! รักอุนที่สุดเลย</h1>
        <p style="color: #ff69b4; font-size: 1rem;">บันทึกไว้แล้วนะว่าเป็นแฟนกัน</p>
    </div>

    <script>
        // ฟังก์ชันเมื่อกด "เป็น"
        function ansYes() {
            document.getElementById('question-card').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
            startHeartRain();
        }

        // ฟังก์ชันทำให้ปุ่มขยับหนี
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const card = document.getElementById('question-card');
            const cardRect = card.getBoundingClientRect();
            
            // ขอบเขตที่อนุญาตให้ปุ่มขยับ (ให้อยู่ภายในหรือใกล้เคียงการ์ด)
            const padding = 20;
            const minX = padding;
            const minY = padding;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            // สุ่มตำแหน่งใหม่ภายในหน้าจอ
            const randomX = Math.random() * (maxX - minX) + minX;
            const randomY = Math.random() * (maxY - minY) + minY;

            // ปรับปุ่มให้เป็น fixed เพื่อขยับไปได้ทั่วหน้าจอ
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            noBtn.style.zIndex = '100'; // ให้อยู่เหนือทุกอย่าง
        }

        // ฟังก์ชันทำหัวใจร่วง
        function startHeartRain() {
            const hearts = ['💖', '💗', '💓', '💝', '💕'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart');
                    heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 3 + 2) + 's'; // สุ่มความเร็ว
                    heart.style.opacity = Math.random(); // สุ่มความโปร่งแสง
                    document.body.appendChild(heart);

                    // ลบ Element เมื่อร่วงจบเพื่อไม่ให้เครื่องอืด
                    setTimeout(() => heart.remove(), 5000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
